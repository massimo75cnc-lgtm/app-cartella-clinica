  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 28px; border-bottom:1px solid var(--line);
    position:fixed; top:0; left:0; right:0; background:rgba(6,10,20,0.75); backdrop-filter: blur(10px); z-index:20;
    transition: transform .35s ease;
  }
  header.hidden{ transform: translateY(-100%); }
  main{ padding-top: 96px; padding-bottom: 90px; }
  .bottom-bar{
    position:fixed; bottom:0; left:0; right:0; z-index:20;
    display:flex; justify-content:center; gap:10px; padding:16px;
    background: rgba(6,10,20,0.78); backdrop-filter: blur(10px);
    border-top:1px solid var(--line);
    transform: translateY(100%); transition: transform .35s ease;
  }
  .bottom-bar.visible{ transform: translateY(0); }
  .floating-nav{
    position:fixed; top:16px; left:16px; z-index:30;
    display:flex; gap:8px;
  }
  .floating-nav button{
    background: var(--panel); border:1px solid var(--line); color: var(--text);
    padding:10px 16px; font-weight:600; box-shadow:0 4px 14px rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
  }
  .floating-nav button:hover{ background: var(--panel-hover); border-color: var(--accent); }
  header h1{ font-size:19px; margin:0; font-weight:600; letter-spacing:0.3px; }
  header h1 span{ color:var(--accent); }
  .header-actions{ display:flex; gap:10px; align-items:center; position:relative; }
  .search-wrap{ position:relative; }
  .search-input{
    background: var(--panel); border:1px solid var(--line); color: var(--text);
    padding:9px 14px 9px 34px; border-radius:10px; font-size:14px; font-family:inherit;
    width:200px; transition: width .2s ease, border-color .2s ease;
  }
  .search-input:focus{ outline:none; border-color: var(--accent); width:260px; }
  .search-icon{ position:absolute; left:11px; top:50%; transform:translateY(-50%); pointer-events:none; opacity:0.6; font-size:13px; }
  .search-results{
    position:absolute; top:calc(100% + 8px); right:0; width:340px; max-height:400px; overflow-y:auto;
    background: var(--panel); border:1px solid var(--line); border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.4);
    z-index:50; display:none;
  }
  .search-results.show{ display:block; }
  .search-results .sr-item{
    display:flex; align-items:center; gap:10px; padding:10px 12px; cursor:pointer; border-bottom:1px solid var(--line);
  }
  .search-results .sr-item:last-child{ border-bottom:none; }
  .search-results .sr-item:hover{ background: var(--panel-hover); }
  .search-results .sr-name{ font-size:13.5px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .search-results .sr-path{ font-size:11.5px; color: var(--text-dim); }
  .search-results .sr-empty{ padding:14px; color: var(--text-dim); font-size:13.5px; text-align:center; }
  button{
    font-family:inherit; cursor:pointer; border-radius:10px; border:1px solid var(--line);
    background: var(--panel); color: var(--text); padding:9px 14px; font-size:14px;
    transition: all .15s ease;
  }
  button:hover{ background: var(--panel-hover); border-color: var(--accent); }
  button.primary{ background: var(--accent); color:#06231f; border-color: var(--accent); font-weight:600; }
  button.primary:hover{ filter:brightness(1.08); }
  button.ghost{ background:transparent; }
  button.danger{ color:var(--danger); }
  main{ max-width:1100px; margin: 0 auto; padding: 28px 24px 80px; animation: fadeIn .35s ease; }
  @keyframes fadeIn{ from{ opacity:0; transform: translateY(6px); } to{ opacity:1; transform: translateY(0); } }

  /* --- welcome / setup --- */
  .setup{
    display:flex; flex-direction:column; align-items:center; text-align:center;
    gap:16px; padding: 90px 20px;
  }
  .setup .icon{ font-size:56px; }
  .setup p{ color: var(--text-dim); max-width:460px; line-height:1.5; }

  /* --- breadcrumb --- */
  .breadcrumb{ display:flex; flex-wrap:wrap; gap:8px; align-items:center; margin-bottom:22px; color:var(--text-dim); font-size:14px; }
  .breadcrumb .home-btn{ background: var(--panel); border:1px solid var(--line); color: var(--text); padding:9px 16px; font-weight:600; }
  .breadcrumb .home-btn:hover{ background: var(--panel-hover); border-color: var(--accent); }
  .breadcrumb button{ background:none; border:none; padding:2px 4px; color:var(--text-dim); }
  .breadcrumb button:hover{ color:var(--accent); border:none; }
  .breadcrumb .sep{ color:var(--line); }
  .breadcrumb .current{ color: var(--text); font-weight:600; }

  /* --- network home view --- */
  .network-wrap{ position:relative; width:100%; max-width:900px; margin: 10px auto 30px; }
  svg.network{ width:100%; height:auto; display:block; }
  .node-circle{ transition: all .25s cubic-bezier(.34,1.56,.64,1); cursor:pointer; transform-origin: center; transform-box: fill-box; }
  .node-group:hover .node-circle{ stroke: var(--node-color, var(--accent)); stroke-width:2.5; transform: scale(1.1); }
  .node-group .node-icon, .node-group .node-label{ transition: transform .25s cubic-bezier(.34,1.56,.64,1); transform-origin: center; transform-box: fill-box; }
  .node-group:hover .node-icon{ transform: scale(1.15); }
  .node-icon{ font-size:26px; text-anchor:middle; dominant-baseline:central; pointer-events:none; }
  .node-label{ font-size:12.5px; fill: var(--text); text-anchor:middle; pointer-events:none; font-weight:600; paint-order:stroke; stroke:#060a14; stroke-width:3px; stroke-linejoin:round; }
  .center-circle{ fill: var(--accent-soft); stroke: var(--accent); stroke-width:1.5; }
  .center-label{ font-size:13px; fill: var(--accent); text-anchor:middle; dominant-baseline:central; font-weight:700; pointer-events:none; paint-order:stroke; stroke:#060a14; stroke-width:3px; stroke-linejoin:round; }
  .link-line{ stroke: var(--accent); stroke-width:1.2; opacity:0.55; filter: drop-shadow(0 0 3px var(--accent)); }
  .scan-ring{ animation: spin 12s linear infinite; transform-origin: center; transform-box: fill-box; opacity:0.65; }
  .scan-ring.reverse{ animation-direction: reverse; animation-duration: 18s; opacity:0.4; }
  @keyframes spin{ from{ transform: rotate(0deg); } to{ transform: rotate(360deg); } }
  .node-group{ cursor:pointer; }

  .empty-hint{ text-align:center; color:var(--text-dim); margin-top:10px; font-size:14px; }

  /* --- folder grid (subfolders) --- */
  .grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap:14px; margin-bottom: 26px; }
  .folder-card{
    background: var(--panel); border:1px solid var(--line); border-radius: var(--radius);
    padding:18px 12px; display:flex; flex-direction:column; align-items:center; gap:8px;
    cursor:pointer; transition: all .15s ease; text-align:center;
  }
  .folder-card{ transition: all .25s cubic-bezier(.34,1.56,.64,1); }
  .folder-card:hover{ background: var(--panel-hover); border-color: var(--accent); transform: translateY(-4px) scale(1.03); }
  .folder-card .ic{
    font-size:26px; width:52px; height:52px; display:flex; align-items:center; justify-content:center;
    border-radius:50%; box-shadow: 0 4px 10px rgba(0,0,0,0.35), inset -3px -3px 6px rgba(0,0,0,0.25), inset 3px 3px 6px rgba(255,255,255,0.15);
  }
  .folder-card .name{ font-size:13.5px; font-weight:600; }
  .add-card{ border-style:dashed; color: var(--text-dim); }
  .add-card:hover{ color: var(--accent); }

  section h2{ font-size:14px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-dim); margin: 26px 0 12px; }

  /* --- files list --- */
  .file-row{
    display:flex; align-items:center; gap:14px; padding:12px 14px; border:1px solid var(--line);
    border-radius:12px; background: var(--panel); margin-bottom:10px; cursor:pointer;
  }
  .file-row{ transition: all .2s ease; }
  .file-row:hover{ border-color: var(--accent); background: var(--panel-hover); transform: translateX(3px); }
  .file-row .ic{ font-size:22px; width:28px; text-align:center; }
  .file-row .meta{ flex:1; min-width:0; }
  .file-row .fname{ font-weight:600; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .file-row .fdate{ font-size:12.5px; color: var(--text-dim); margin-top:2px; }
  .file-row .note{ font-size:12.5px; color: var(--text-dim); font-style:italic; margin-top:2px; }
  .file-row .actions{ display:flex; gap:6px; }
  .file-row .actions button{ padding:6px 10px; font-size:12.5px; }

  .empty-list{ color:var(--text-dim); font-size:14px; padding: 18px 4px; }

  /* --- modal --- */
  .modal-backdrop{
    position:fixed; inset:0; background:rgba(4,8,16,0.6); backdrop-filter: blur(3px);
    display:flex; align-items:center; justify-content:center; z-index:100; padding:20px;
  }
  .modal{
    background: var(--panel); border:1px solid var(--line); border-radius: var(--radius);
    padding:24px; width:100%; max-width:380px;
  }
  .modal h3{ margin:0 0 16px; font-size:16px; }
  .modal label{ display:block; font-size:13px; color:var(--text-dim); margin-bottom:6px; margin-top:14px; }
  .modal input[type=text], .modal input[type=date]{
    width:100%; padding:10px 12px; border-radius:9px; border:1px solid var(--line);
    background: var(--bg-soft); color:var(--text); font-family:inherit; font-size:14px;
  }
  .modal .modal-actions{ display:flex; justify-content:flex-end; gap:10px; margin-top:22px; }

  .toast{
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
    background: var(--panel); border:1px solid var(--accent); color:var(--text);
    padding:12px 20px; border-radius:12px; font-size:14px; z-index:200;
    opacity:0; pointer-events:none; transition: opacity .25s ease;
  }
  .toast.show{ opacity:1; }

  .unsupported{ max-width:520px; margin: 80px auto; text-align:center; color: var(--text-dim); line-height:1.6; }
</style>
</head>

  [["allerg"], ["🌿","🤧"]],
  [["farmac","terapia","cura"], ["💊","🧬"]],
  [["pronto","emergenza","urgenza"], ["🚑","🆘"]],
];
function iconFor(name){
  const n = name.toLowerCase();
  for(const [keys, icons] of ICON_MAP){
    if(keys.some(k => n.includes(k))){
      // sceglie una variante in modo stabile, basata sul nome della cartella
      let hash = 0;
      for(let i = 0; i < name.length; i++){ hash = name.charCodeAt(i) + ((hash << 5) - hash); }
      return icons[Math.abs(hash) % icons.length];
    }
  }
  return "📁";
}

/* icone vettoriali "ologramma" per le categorie principali (cuore, polmoni, cervello) */

  const n = name.toLowerCase();
  if(["cardio","cuore"].some(k => n.includes(k))) return 'heart';
  if(["pneumo","polmon","respir","bronch"].some(k => n.includes(k))) return 'lungs';
  if(["neuro","cervello","psicolog","mentale","ansia","depress"].some(k => n.includes(k))) return 'brain';
  if(["vaccin"].some(k => n.includes(k))) return 'syringe';
  if(["diabet"].some(k => n.includes(k))) return 'diabetes';
  if(["radiolog","tac","rx","risonanza","ecograf"].some(k => n.includes(k))) return 'skull';
  return null;
}

function fileIcon(name){
  const ext = name.split('.').pop().toLowerCase();
  if(['jpg','jpeg','png','heic','gif','webp'].includes(ext)) return "🖼️";
  if(ext === 'pdf') return "📄";

/* ============ PERSISTENZA HANDLE CARTELLA (IndexedDB) ============ */
function idbOpen(){
  return new Promise((res, rej) => {
    const req = indexedDB.open('cartellaClinicaDB', 1);
    req.onupgradeneeded = () => req.result.createObjectStore('handles');
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}
async function idbSet(key, val){
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction('handles', 'readwrite');
    tx.objectStore('handles').put(val, key);
    tx.oncomplete = () => res();
    tx.onerror = () => rej(tx.error);
  });
}
async function idbGet(key){
  const db = await idbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction('handles', 'readonly');
    const req = tx.objectStore('handles').get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = () => rej(req.error);
  });
}

/* ============ MANIFEST (metadati file: data referto, nota) ============ */
async function readManifest(dirHandle){
  try{
    const fh = await dirHandle.getFileHandle('manifest.json');
    const file = await fh.getFile();
    const text = await file.text();
    return JSON.parse(text || '{}');
  }catch(e){ return {}; }
}
async function writeManifest(dirHandle, manifest){
  const fh = await dirHandle.getFileHandle('manifest.json', {create:true});
  const w = await fh.createWritable();
  await w.write(JSON.stringify(manifest, null, 2));
  await w.close();
}

/* ============ LETTURA CONTENUTO CARTELLA ============ */
async function listEntries(dirHandle){
  const folders = [];
  const files = [];
  for await (const [name, handle] of dirHandle.entries()){
    if(name === 'manifest.json' || name.startsWith('.')) continue;
    if(handle.kind === 'directory') folders.push({name, handle});
    else files.push({name, handle});
  }
  folders.sort((a,b)=> a.name.localeCompare(b.name, 'it'));
  return {folders, files};
}

/* ricerca ricorsiva dei file nell'intera struttura di cartelle */
async function searchFiles(dirHandle, pathSoFar, query, results = [], depth = 0){
  if(depth > 8) return results; // limite di sicurezza
  for await (const [name, handle] of dirHandle.entries()){
    if(name === 'manifest.json' || name.startsWith('.')) continue;
    if(handle.kind === 'file'){
      if(name.toLowerCase().includes(query)){
        results.push({ name, handle, path: pathSoFar, dirHandle });
      }
    } else if(handle.kind === 'directory'){
      await searchFiles(handle, [...pathSoFar, name], query, results, depth + 1);
    }
  }
  return results;
}

function renderSearchResults(matches, box, query){
  box.innerHTML = '';
  if(matches.length === 0){
    box.innerHTML = `<div class="sr-empty">Nessun referto trovato per "${escapeHtml(query)}"</div>`;
  } else {
    matches.slice(0, 30).forEach(m => {
      const item = document.createElement('div');
      item.className = 'sr-item';
      item.innerHTML = `
        <div class="ic">${fileIcon(m.name)}</div>
        <div>
          <div class="sr-name">${escapeHtml(m.name)}</div>
          <div class="sr-path">${m.path.length ? escapeHtml(m.path.join(' › ')) : 'Home'}</div>
        </div>
      `;
      item.onclick = () => openFile(m.handle);
      box.appendChild(item);
    });
  }
  box.classList.add('show');
}

async function tryRestoreRoot(){
  try{
    const handle = await idbGet('root');
    if(!handle) return false;
    const perm = await handle.queryPermission({mode:'readwrite'});
    if(perm === 'granted'){
      rootHandle = handle;
      return true;
    }
    // permesso da confermare con un click dell'utente: mostriamo un bottone dedicato
    rootHandle = null;
    window._pendingHandle = handle;
    return 'pending';
  }catch(e){ return false; }
}

async function confirmPendingPermission(){
  const handle = window._pendingHandle;
  if(!handle) return;
  const perm = await handle.requestPermission({mode:'readwrite'});
  if(perm === 'granted'){
    rootHandle = handle;
    toast('Accesso confermato ✓');
    renderHeaderActions();
    renderHome();
  } else {
    toast('Permesso negato. Seleziona di nuovo la cartella.');
    renderSetup();
  }
}

/* ============ VISTA: HOME (mappa a nodi) ============ */
async function renderHome(){
  const app = document.getElementById('app');
  app.innerHTML = '';
  removeBottomBar();
  removeFloatingNav();
  if(!rootHandle){ renderSetup(); return; }

  const {folders} = await listEntries(rootHandle);

  const wrap = document.createElement('div');
  wrap.className = 'network-wrap';

  if(folders.length === 0){
    wrap.innerHTML = `<div class="empty-hint">Nessun argomento ancora creato.</div>`;
    app.appendChild(wrap);
    const addBtn = document.createElement('button');
    addBtn.className = 'primary';
    addBtn.style.display = 'block';
    addBtn.style.margin = '20px auto';
    addBtn.textContent = '+ Crea primo argomento';
    addBtn.onclick = () => openNewFolderModal(rootHandle, renderHome);
    app.appendChild(addBtn);
    return;
  }

  const n = folders.length;
  // canvas più grande e cerchi più piccoli quando ci sono molte cartelle, per evitare sovrapposizioni
  const nodeR = n > 16 ? 26 : n > 12 ? 30 : n > 8 ? 34 : 42;
  const useTwoRings = false;
  const W = useTwoRings ? 1100 : 900;
  const H = useTwoRings ? 820 : 620;
  const cx = W/2, cy = H/2;
  const R = Math.min(W,H)/2 - (useTwoRings ? 70 : 90);
  const Rinner = R * 0.55;

  // calcola la posizione di ogni nodo: anello singolo, oppure doppio anello sfalsato se sono tanti
  const positions = folders.map((f, i) => {
    if(!useTwoRings){
      const angle = (2*Math.PI*i/n) - Math.PI/2;
      return { x: cx + R*Math.cos(angle), y: cy + R*Math.sin(angle) };
    }
    const half = Math.ceil(n/2);
    if(i < half){
      const angle = (2*Math.PI*i/half) - Math.PI/2;
      return { x: cx + Rinner*Math.cos(angle), y: cy + Rinner*Math.sin(angle) };
    } else {
      const j = i - half;
      const count2 = n - half;
      const angle = (2*Math.PI*j/count2) - Math.PI/2 + (Math.PI/count2);
      return { x: cx + R*Math.cos(angle), y: cy + R*Math.sin(angle) };
    }
  });

  let svg = `<svg class="network" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">`;
  svg += `<defs>
    <filter id="nodeShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <filter id="iconGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="centerGrad" cx="35%" cy="30%" r="75%">
      <stop offset="0%" stop-color="#7fe8de"/>
      <stop offset="100%" stop-color="#1f8f82"/>
    </radialGradient>
  </defs>`;

  // linee
  folders.forEach((f, i) => {
    svg += `<line class="link-line" x1="${cx}" y1="${cy}" x2="${positions[i].x}" y2="${positions[i].y}" />`;
  });

  // nodo centrale (con sfumatura, ombra e riflesso)
  svg += `<g filter="url(#nodeShadow)">
    <circle cx="${cx}" cy="${cy}" r="52" fill="url(#centerGrad)"/>
    <ellipse cx="${cx-16}" cy="${cy-20}" rx="16" ry="9" fill="white" opacity="0.35" filter="url(#softBlur)"/>
  </g>
  <text class="center-label" x="${cx}" y="${cy}">Cartella<tspan x="${cx}" dy="16">Clinica</tspan></text>`;

  // nodi argomento (con sfumatura, ombra, riflesso lucido, anelli a scansione ed etichetta leggibile)
  folders.forEach((f, i) => {
    const {x, y} = positions[i];
    const c = colorVariants(f.name);
    const gradId = `grad-${i}`;
    const labelText = truncate(f.name, useTwoRings ? 15 : 18);
    const labelWidth = Math.max(60, labelText.length * 7.2);
    svg += `<g class="node-group" data-idx="${i}" style="--node-color:${c.mid}">
      <title>${escapeXml(f.name)}</title>
      <defs>
        <radialGradient id="${gradId}" cx="35%" cy="30%" r="75%">
          <stop offset="0%" stop-color="${c.light}"/>
          <stop offset="100%" stop-color="${c.dark}"/>
        </radialGradient>
      </defs>
      <g filter="url(#nodeShadow)">
        <circle class="node-circle" cx="${x}" cy="${y}" r="${nodeR}" fill="url(#${gradId})" opacity="0.88"/>
        <ellipse cx="${x-nodeR*0.3}" cy="${y-nodeR*0.35}" rx="${nodeR*0.3}" ry="${nodeR*0.16}" fill="white" opacity="0.4" filter="url(#softBlur)"/>
      </g>
      <circle class="scan-ring" cx="${x}" cy="${y}" r="${nodeR+7}" fill="none" stroke="${c.light}" stroke-width="1.5" stroke-dasharray="4 7"/>
      <circle class="scan-ring reverse" cx="${x}" cy="${y}" r="${nodeR+13}" fill="none" stroke="${c.light}" stroke-width="1" stroke-dasharray="2 10"/>
      ${organIconSvg(organKindFor(f.name) || (iconFor(f.name) === '📁' ? 'generic' : null), x, y-4, c.light) || `<text class="node-icon" x="${x}" y="${y-6}">${iconFor(f.name)}</text>`}
      <rect x="${x-labelWidth/2}" y="${y+nodeR-4}" width="${labelWidth}" height="20" rx="6" fill="#060a14" opacity="0.6"/>
      <text class="node-label" x="${x}" y="${y+nodeR+10}">${escapeXml(labelText)}</text>
    </g>`;
  });

  svg += `</svg>`;
  wrap.innerHTML = svg;
  app.appendChild(wrap);

  wrap.querySelectorAll('.node-group').forEach(g => {
    g.addEventListener('click', () => {
      const idx = parseInt(g.dataset.idx);
      const f = folders[idx];
      pathStack.push({name: f.name, handle: f.handle});
      renderFolderView();
    });
  });

  const controls = document.createElement('div');
  controls.className = 'bottom-bar';
  const addBtn = document.createElement('button');
  addBtn.className = 'primary';
  addBtn.textContent = '+ Nuovo argomento';
  addBtn.onclick = () => openNewFolderModal(rootHandle, renderHome);
  controls.appendChild(addBtn);
  if(folders.length >= 2){
    const mergeBtn = document.createElement('button');
    mergeBtn.textContent = '🔗 Unisci cartelle';
    mergeBtn.onclick = () => openMergeFoldersModal(rootHandle, folders, renderHome);
    controls.appendChild(mergeBtn);
  }
  document.body.appendChild(controls);
  setTimeout(() => showBarTemporarily(controls), 50);
}

function truncate(s, n){ return s.length > n ? s.slice(0,n-1)+'…' : s; }
function escapeXml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* genera un colore stabile (sempre lo stesso per lo stesso nome) da usare come accento della cartella */
function colorFor(name){
  let hash = 0;
  for(let i = 0; i < name.length; i++){ hash = name.charCodeAt(i) + ((hash << 5) - hash); }
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 65%, 62%)`;
}
function colorVariants(name){
  let hash = 0;
  for(let i = 0; i < name.length; i++){ hash = name.charCodeAt(i) + ((hash << 5) - hash); }
  const hue = Math.abs(hash) % 360;
  return {
    light: `hsl(${hue}, 75%, 68%)`,
    mid:   `hsl(${hue}, 65%, 50%)`,
    dark:  `hsl(${hue}, 60%, 30%)`
  };
}

    card.title = f.name;
    const cv = colorVariants(f.name);
    card.style.borderLeft = `3px solid ${cv.mid}`;
    card.innerHTML = `<div class="ic" style="background: radial-gradient(circle at 35% 30%, ${cv.light}, ${cv.dark});">${iconFor(f.name)}</div><div class="name">${escapeHtml(f.name)}</div>`;
    card.onclick = () => { pathStack.push({name:f.name, handle:f.handle}); renderFolderView(); };
    grid.appendChild(card);
  });
  const addCard = document.createElement('div');
  addCard.className = 'folder-card add-card';
  addCard.innerHTML = `<div class="ic">➕</div><div class="name">Nuova sottocartella</div>`;
  addCard.onclick = () => openNewFolderModal(dirHandle, renderFolderView);
  grid.appendChild(addCard);
  app.appendChild(grid);

  if(folders.length >= 2){
    const mergeBtn = document.createElement('button');
    mergeBtn.textContent = '🔗 Unisci cartelle';
    mergeBtn.style.marginTop = '-10px';
    mergeBtn.style.marginBottom = '18px';
    mergeBtn.onclick = () => openMergeFoldersModal(dirHandle, folders, renderFolderView);
    app.appendChild(mergeBtn);
  }

  // file
  const h2b = document.createElement('h2');
  h2b.textContent = 'Referti in questa cartella';
  app.appendChild(h2b);

  const addFileBtn = document.createElement('button');
  addFileBtn.className = 'primary';
  addFileBtn.style.marginBottom = '14px';
  addFileBtn.textContent = '+ Aggiungi referto (PDF / JPG)';
  addFileBtn.onclick = () => addFiles(dirHandle, renderFolderView);
  app.appendChild(addFileBtn);

  if(files.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty-list';
    empty.textContent = 'Nessun referto qui ancora.';
    app.appendChild(empty);
  } else {
    // ordina per data (manifest) desc, fallback lastModified
    const rows = await Promise.all(files.map(async f => {
      const meta = manifest[f.name] || {};
      let date = meta.date;
      if(!date){
        const file = await f.handle.getFile();
        date = new Date(file.lastModified).toISOString().slice(0,10);
      }
      return {...f, date, note: meta.note || ''};
    }));
    rows.sort((a,b) => b.date.localeCompare(a.date));

    rows.forEach(r => {
      const row = document.createElement('div');
      row.className = 'file-row';
      row.innerHTML = `
        <div class="ic">${fileIcon(r.name)}</div>
        <div class="meta">
          <div class="fname">${escapeHtml(r.name)}</div>
          <div class="fdate">${fmtDate(r.date)}</div>
          ${r.note ? `<div class="note">${escapeHtml(r.note)}</div>` : ''}
        </div>
        <div class="actions">
          <button data-act="open">Apri</button>
          <button data-act="del" class="danger">Elimina</button>
        </div>
      `;
      row.querySelector('[data-act=open]').onclick = (e) => { e.stopPropagation(); openFile(r.handle); };
      row.querySelector('[data-act=del]').onclick = async (e) => {
        e.stopPropagation();
        if(confirm(`Eliminare "${r.name}"? L'azione non è reversibile.`)){
          await dirHandle.removeEntry(r.name);
          delete manifest[r.name];
          await writeManifest(dirHandle, manifest);
          renderFolderView();
        }
      };
      app.appendChild(row);
    });
  }
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function openFile(fileHandle){
  const file = await fileHandle.getFile();
  const url = URL.createObjectURL(file);
  window.open(url, '_blank');
}

/* ============ MODALE: NUOVA CARTELLA ============ */
function openNewFolderModal(parentHandle, onDone){
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  backdrop.innerHTML = `
    <div class="modal">
      <h3>Nuova cartella</h3>
      <label>Nome argomento (es. Pneumologia)</label>
      <input type="text" id="folderName" placeholder="Es. Pneumologia" />
      <div class="modal-actions">
        <button id="cancelBtn">Annulla</button>
        <button id="okBtn" class="primary">Crea</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  const input = backdrop.querySelector('#folderName');
  input.focus();
  backdrop.querySelector('#cancelBtn').onclick = () => backdrop.remove();
  backdrop.querySelector('#okBtn').onclick = async () => {
    const name = input.value.trim();
    if(!name) return;
    await parentHandle.getDirectoryHandle(name, {create:true});
    backdrop.remove();
    toast(`Cartella "${name}" creata ✓`);
    onDone();
  };
  input.addEventListener('keydown', e => { if(e.key === 'Enter') backdrop.querySelector('#okBtn').click(); });
}

/* ============ AGGIUNTA FILE (con data e nota) ============ */
function addFiles(dirHandle, onDone){
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.pdf,.jpg,.jpeg,.png,.heic,.webp';
  input.multiple = true;
  input.onchange = async () => {
    const selected = Array.from(input.files);
    for(const file of selected){
      await openFileMetaModal(file, dirHandle);
    }
    onDone();
  };
  input.click();
}

function openFileMetaModal(file, dirHandle){
  return new Promise((resolve) => {
    const today = new Date().toISOString().slice(0,10);
    const backdrop = document.createElement('div');
    backdrop.className = 'modal-backdrop';
    backdrop.innerHTML = `
      <div class="modal">
        <h3>Aggiungi: ${escapeHtml(file.name)}</h3>
        <label>Data del referto</label>
        <input type="date" id="fdate" value="${today}" />
        <label>Nota (opzionale)</label>
        <input type="text" id="fnote" placeholder="Es. Controllo semestrale" />
        <div class="modal-actions">
          <button id="skipBtn">Annulla</button>
          <button id="saveBtn" class="primary">Salva</button>
        </div>
      </div>
    `;
    document.body.appendChild(backdrop);
    backdrop.querySelector('#skipBtn').onclick = () => { backdrop.remove(); resolve(); };
    backdrop.querySelector('#saveBtn').onclick = async () => {
      const date = backdrop.querySelector('#fdate').value || today;
      const note = backdrop.querySelector('#fnote').value.trim();

      // copia il file nella cartella
      const fh = await dirHandle.getFileHandle(file.name, {create:true});
      const w = await fh.createWritable();
      await w.write(await file.arrayBuffer());
      await w.close();

      // aggiorna manifest
      const manifest = await readManifest(dirHandle);
      manifest[file.name] = {date, note};
      await writeManifest(dirHandle, manifest);

      backdrop.remove();
      toast(`"${file.name}" aggiunto ✓`);
      resolve();
    };
  });
}

/* ============ UNIONE CARTELLE ============ */
function openMergeFoldersModal(parentHandle, folders, onDone){
  const backdrop = document.createElement('div');
  backdrop.className = 'modal-backdrop';
  const checkboxesHtml = folders.map((f, i) => `
    <label style="display:flex; align-items:center; gap:8px; padding:8px 0; font-size:14px; cursor:pointer;">
      <input type="checkbox" data-idx="${i}" style="width:16px; height:16px;"> ${escapeHtml(f.name)}
    </label>
  `).join('');
  backdrop.innerHTML = `
    <div class="modal" style="max-width:420px;">
      <h3>Unisci cartelle</h3>
      <p style="color:var(--text-dim); font-size:13.5px; margin:0 0 4px;">Seleziona almeno 2 cartelle da unire insieme.</p>
      <div style="max-height:220px; overflow-y:auto; margin-top:8px;">${checkboxesHtml}</div>
      <label>Nome della cartella unita</label>
      <input type="text" id="mergeName" placeholder="Es. Cuore" />
      <div class="modal-actions">
        <button id="cancelBtn">Annulla</button>
        <button id="okBtn" class="primary">Unisci</button>
      </div>
    </div>
  `;
  document.body.appendChild(backdrop);
  backdrop.querySelector('#cancelBtn').onclick = () => backdrop.remove();
  backdrop.querySelector('#okBtn').onclick = async () => {
    const checked = Array.from(backdrop.querySelectorAll('input[type=checkbox]:checked'))
      .map(cb => folders[parseInt(cb.dataset.idx)]);
    const targetName = backdrop.querySelector('#mergeName').value.trim();
    if(checked.length < 2){ toast('Seleziona almeno 2 cartelle.'); return; }
    if(!targetName){ toast('Dai un nome alla cartella unita.'); return; }

    backdrop.querySelector('#okBtn').textContent = 'Unione in corso…';
    backdrop.querySelector('#okBtn').disabled = true;
    try{
      await mergeFolders(parentHandle, checked, targetName);
      backdrop.remove();
      toast(`Cartelle unite in "${targetName}" ✓`);
      onDone();
    }catch(e){
      console.error(e);
      toast('Errore durante l\'unione. Riprova.');
      backdrop.remove();
    }
  };
}

async function mergeFolders(parentHandle, sourceFolders, targetName){
  const target = await parentHandle.getDirectoryHandle(targetName, {create:true});
  let targetManifest = await readManifest(target);

  for(const src of sourceFolders){
    const isTargetItself = src.name === targetName;
    const srcHandle = src.handle;
    const srcManifest = await readManifest(srcHandle);

    for await (const [name, handle] of srcHandle.entries()){
      if(name === 'manifest.json' || name.startsWith('.')) continue;
      if(isTargetItself) continue; // già a posto, non serve ricopiare su se stessa

      let finalName = name;
      // evita di sovrascrivere un file già presente nella cartella unita
      if(await entryExists(target, finalName)){
        const dot = finalName.lastIndexOf('.');
        const base = dot > 0 ? finalName.slice(0, dot) : finalName;
        const ext = dot > 0 ? finalName.slice(dot) : '';
        let counter = 2;
        while(await entryExists(target, `${base} (${counter})${ext}`)) counter++;
        finalName = `${base} (${counter})${ext}`;
      }

      if(handle.kind === 'file'){
        const destFh = await target.getFileHandle(finalName, {create:true});
        const w = await destFh.createWritable();
        const file = await handle.getFile();
        await w.write(await file.arrayBuffer());
        await w.close();
        if(srcManifest[name]) targetManifest[finalName] = srcManifest[name];
      } else if(handle.kind === 'directory'){
        const destSub = await target.getDirectoryHandle(finalName, {create:true});
        await copyDirRecursive(handle, destSub);
      }
    }

    if(!isTargetItself){
      await parentHandle.removeEntry(src.name, {recursive:true});
    }
  }

  await writeManifest(target, targetManifest);
}

async function entryExists(dirHandle, name){
  try{ await dirHandle.getFileHandle(name); return true; }catch(e){}
  try{ await dirHandle.getDirectoryHandle(name); return true; }catch(e){}
  return false;
}

async function copyDirRecursive(srcHandle, destHandle){
  for await (const [name, handle] of srcHandle.entries()){
    if(handle.kind === 'file'){
      const destFh = await destHandle.getFileHandle(name, {create:true});
      const w = await destFh.createWritable();
      const file = await handle.getFile();
      await w.write(await file.arrayBuffer());
      await w.close();
    } else {
      const destSub = await destHandle.getDirectoryHandle(name, {create:true});
      await copyDirRecursive(handle, destSub);
    }
  }
}

/* ============ AUTO-NASCONDI BARRE (sopra e sotto, stile barra di Windows) ============ */
function showBarTemporarily(el){
  if(!el) return;
  el.classList.add('visible');
  el.classList.remove('hidden');
  clearTimeout(el._hideTimer);
  el._hideTimer = setTimeout(() => {
    if(!el.matches(':hover')){
      el.classList.remove('visible');
      el.classList.add('hidden');
    }
  }, 2200);
}
function setupAutoHideBars(){
  document.addEventListener('mousemove', (e) => {
    const header = document.querySelector('header');
    if(header && e.clientY < 90) showBarTemporarily(header);
    const bottomBar = document.querySelector('.bottom-bar');
    if(bottomBar && e.clientY > window.innerHeight - 90) showBarTemporarily(bottomBar);
  });
  showBarTemporarily(document.querySelector('header'));
}
